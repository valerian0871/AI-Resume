<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff4bcf" />
      <stop offset="50%" stop-color="#9875ff" />
      <stop offset="100%" stop-color="#49e7ff" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="100" height="100" rx="24" fill="#070816" />
  
  <g transform="translate(50, 50)" filter="url(#glow)">
    <path d="M -20 -10 L 0 -30 L 20 -10 L 10 20 L -10 20 Z" fill="none" stroke="url(#grad1)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="8s" repeatCount="indefinite" />
    </path>
    <circle cx="0" cy="0" r="8" fill="url(#grad1)">
      <animate attributeName="r" values="6;9;6" dur="3s" repeatCount="indefinite" />
    </circle>
  </g>
</svg>
